# Server bind addresses (0.0.0.0 = all interfaces)
ac.host=0.0.0.0
ac.port=5683
ar.host=0.0.0.0
ar.port=5684

# GPS client update interval (ms)
gps.update.interval=3000

# Base URIs for clients (will be built from server hosts)
driver.ac.base=coap://localhost:5683
reliever.ar.base=coap://localhost:5684

# Client IDs
driver.id=D
reliever.id=R
